include:
  - project: 'tnoff-projects/github-workflows'
    ref: cfe4637ce67d24b088e57e2f26db6ed9cc047f5b
    file: '/gitlab/renovate.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: cfe4637ce67d24b088e57e2f26db6ed9cc047f5b
    file: '/gitlab/discord-notify.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: cfe4637ce67d24b088e57e2f26db6ed9cc047f5b
    file: '/gitlab/branch-cleanup.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: cfe4637ce67d24b088e57e2f26db6ed9cc047f5b
    file: '/gitlab/trufflehog.yml'
  - project: 'tnoff-projects/github-workflows'
    ref: cfe4637ce67d24b088e57e2f26db6ed9cc047f5b
    file: '/gitlab/bump-version.yml'

stages:
  - pr-check
  - test
  - renovate

default:
  # Ride out ci-pool cold-starts / node churn (warm ci floor + autoscaler
  # scale-down grace live in terraform nodes_v2_ci and docker-apps
  # cluster-autoscaler). These `when:` classes are infra-side failures, never
  # `script_failure`, so a failing test/lint is never silently retried. GitLab
  # caps retry:max at 2 (= 3 total attempts).
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - scheduler_failure
  interruptible: true
  # Pin all jobs to the OKE self-hosted runner. bump-version / tag / release
  # templates run on the private $CI_ALPINE_UTILS_IMAGE (iad.ocir.io/tnoff/*),
  # which only the in-cluster runner can pull — GitLab SaaS shared runners are
  # anonymous to OCIR. Without this tag, untagged jobs race onto a SaaS runner
  # and fail with "pull access denied" at prepare_executor.
  tags:
    - self-hosted

"pr-check:secrets":
  extends: .trufflehog
  stage: pr-check
  rules:
    # Fork MRs require a project member to manually trigger jobs — prevents untrusted code from running CI automatically
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

bump-version:
  extends: .bump-version
  variables:
    GITLAB_PUSH_TOKEN: $RENOVATE_TOKEN
    VERSION_FILE: package.json
    VERSION_FILE_TYPE: json
    VERSION_JSON_KEY: version
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME =~ /^renovate\/dev-/

"test:node":
  stage: test
  image: docker.io/library/node:${NODE_VERSION}
  parallel:
    matrix:
      - NODE_VERSION: ["20", "22"]
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/
  script:
    - npm ci --cache .npm --prefer-offline
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_PROJECT_ID != $CI_PROJECT_ID
      when: manual
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"

renovate:
  extends: .renovate
  stage: renovate
  variables:
    GITHUB_COM_TOKEN: $GITHUB_BOT_TOKEN
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Scheduled prune of stale automation branches (bump/* + renovate/*) left
# behind because remove_source_branch only fires on MR merge, not on the
# API-driven close of a superseded bump/renovate MR. Rides the weekly
# schedule and reuses RENOVATE_TOKEN. See the github-workflows
# .branch-cleanup template and docs runbooks/branch-cleanup.md.
branch-cleanup:
  extends: .branch-cleanup
  stage: renovate
  variables:
    CLEANUP_AGE_DAYS: "30"
    DRY_RUN: "false"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# Discord failure notifications for the scheduled jobs — the only non-MR
# pipelines this repo runs (post-A, pr-check:secrets + test:node are MR-only).
# MR-time validation failures are surfaced in the MR widget, so they are
# deliberately not notified here. Webhook is the group-level
# DISCORD_BUILD_FAILURE_WEBHOOK.
"notify:renovate-failure":
  extends: .discord-notify
  stage: renovate
  needs: [renovate]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Renovate failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure

"notify:cleanup-failure":
  extends: .discord-notify
  stage: renovate
  needs: [branch-cleanup]
  variables:
    NOTIFY_TYPE: failure
    DISCORD_WEBHOOK_URL: $DISCORD_BUILD_FAILURE_WEBHOOK
    NOTIFY_MESSAGE: 'Branch cleanup failed'
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
      when: on_failure
